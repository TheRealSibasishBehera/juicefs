name: publish-mount-image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag override (default: ce-v<juicefs-version>)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build JuiceFS
        uses: ./.github/actions/build

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          version=$(./juicefs version | awk '{print $3}' | cut -d '-' -f1)
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="ce-v${version}"
          fi
          image="ghcr.io/${{ github.repository_owner }}/juicefs-mount:${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${image}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/scripts/chaos/juicefs.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}

      - name: Summary
        run: |
          echo "Pushed: ${{ steps.meta.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
