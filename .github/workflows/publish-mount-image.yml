name: publish-mount-image

on:
  push:
    branches:
      - feat/volume-fork-deferred
    paths:
      - ".github/workflows/publish-mount-image.yml"
      - ".github/scripts/chaos/juicefs.Dockerfile"
      - ".github/actions/build/action.yml"
      - "Makefile"
      - "**.go"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag override (default: ce-v<juicefs-version>)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build JuiceFS (static)
        shell: bash
        run: |
          sudo .github/scripts/apt_install.sh musl-tools upx-ucl
          export STATIC=1
          make juicefs
          ./juicefs version

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          version=$(./juicefs version | awk '{print $3}' | cut -d '-' -f1)
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="ce-v${version}"
          fi
          image="ghcr.io/${owner}/juicefs-mount:${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${image}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/scripts/chaos/juicefs.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}

      - name: Summary
        run: |
          echo "Pushed: ${{ steps.meta.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
