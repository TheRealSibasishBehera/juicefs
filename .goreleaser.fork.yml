version: 2
project_name: juicefs
env:
  - GO111MODULE=on
  - CGO_ENABLED=0
before:
  hooks:
    - go mod download
builds:
  - id: juicefs-linux-amd64
    ldflags: -s -w -X github.com/juicedata/juicefs/pkg/version.version={{.Version}} -X github.com/juicedata/juicefs/pkg/version.revision={{.ShortCommit}}
    main: .
    goos: [linux]
    goarch: [amd64]
  - id: juicefs-linux-arm64
    ldflags: -s -w -X github.com/juicedata/juicefs/pkg/version.version={{.Version}} -X github.com/juicedata/juicefs/pkg/version.revision={{.ShortCommit}}
    main: .
    goos: [linux]
    goarch: [arm64]
archives:
  - id: juicefs
    name_template: "juicefs-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: TheRealSibasishBehera
    name: juicefs
changelog:
  disable: true
